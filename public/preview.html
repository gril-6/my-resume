<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lowcode Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #080c14;
        color: #edf4ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #preview {
        position: relative;
        margin: 32px auto;
        overflow: hidden;
        background-image:
          linear-gradient(rgba(120, 156, 214, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(120, 156, 214, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
      }
      .node {
        position: absolute;
        box-sizing: border-box;
        border: 1px solid rgba(126, 164, 220, 0.26);
        display: grid;
        place-items: center;
        padding: 12px;
        backdrop-filter: blur(16px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      }
    </style>
  </head>
  <body>
    <div id="preview"></div>
    <script>
      const params = new URLSearchParams(location.search);
      const schema = JSON.parse(params.get('schema') || '{}');
      const root = document.querySelector('#preview');
      root.style.width = `${schema.canvas.width}px`;
      root.style.height = `${schema.canvas.height}px`;
      schema.components.forEach((node) => {
        if (node.hidden) return;
        const el = document.createElement('div');
        el.className = 'node';
        Object.assign(el.style, {
          left: `${node.style.x}px`,
          top: `${node.style.y}px`,
          width: `${node.style.width}px`,
          height: `${node.style.height}px`,
          zIndex: node.style.zIndex,
          opacity: node.style.opacity,
          background: node.style.background,
          color: node.style.color,
          borderRadius: `${node.style.radius}px`,
          fontSize: `${node.style.fontSize}px`,
          fontWeight: node.style.fontWeight,
        });
        el.textContent = node.props.text || node.props.title || node.props.label || node.name;
        root.appendChild(el);
      });
    </script>
  </body>
</html>
